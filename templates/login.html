{% extends "base.html" %}
{% block content %}

<div class="container mt-4" style="max-width: 420px;">

  <h3 class="text-center mb-3">Iniciar sesión</h3>

  <form action="{{ url_for('login') }}" method="post" class="card p-4 shadow-sm">

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" name="email" required placeholder="ejemplo@correo.com">
    </div>

    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-control" name="password" required placeholder="••••••••">
    </div>

    <button class="btn btn-primary w-100 mb-2">Ingresar</button>

    <p class="text-center small mt-2">
      ¿No tienes cuenta? <a href="{{ url_for('register') }}">Regístrate aquí</a>
    </p>
  </form>

</div>

{% endblock %}
