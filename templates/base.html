<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Ingresos Picker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('listar_meses') }}">
      Ingresos Picker
    </a>
  </div>
</nav>

<div class="container mb-4">

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 my-2 small">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <!-- BLOQUE IMPORTANTE -->
  {% block content %}
  {% endblock %}
  <!-- FIN BLOQUE -->

</div>

</body>
</html>
