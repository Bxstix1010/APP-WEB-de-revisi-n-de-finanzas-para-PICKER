{% extends "base.html" %}
{% block content %}

<div class="container mt-4" style="max-width: 420px;">

  <h3 class="text-center mb-3">Crear cuenta</h3>

  <form action="{{ url_for('register') }}" method="post" class="card p-4 shadow-sm">

    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-control" name="nombre" required placeholder="Tu nombre">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" name="email" required placeholder="ejemplo@correo.com">
    </div>

    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-control" name="password" required placeholder="••••••••">
    </div>

    <button class="btn btn-success w-100 mb-2">Registrarme</button>

    <p class="text-center small mt-2">
      ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Iniciar sesión</a>
    </p>
  </form>

</div>

{% endblock %}
